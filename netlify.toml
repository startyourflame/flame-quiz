[build]
  publish = "."

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[redirects]]
  from = "/quiz"
  to = "/quiz.html"
  status = 301

[[redirects]]
  from = "/ergebnis"
  to = "/ergebnis.html"
  status = 301

[[redirects]]
  from = "/kurs"
  to = "/automatisierungs-kurs.html"
  status = 301
