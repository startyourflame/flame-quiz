[build]
  publish = "."

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Caching: Statische Assets lange cachen
[[headers]]
  for = "*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/media/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# HTML: kurzer Cache mit Revalidierung
[[headers]]
  for = "*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[redirects]]
  from = "/quiz"
  to = "/quiz.html"
  status = 301

[[redirects]]
  from = "/ergebnis"
  to = "/ergebnis.html"
  status = 301

[[redirects]]
  from = "/kurs"
  to = "/automatisierungs-kurs.html"
  status = 301
