<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz – Automatisierungs-Check</title>
    <!-- Favicon + Theme -->
  <link rel="icon" type="image/png" href="media/flame_logo_icon.png">
  <link rel="apple-touch-icon" href="media/flame_logo_icon.png">
  <meta name="theme-color" content="#212326">

  <!-- Funnel-Step: kein Suchmaschinenindex -->
  <meta name="robots" content="noindex, nofollow">

  <!-- Google Fonts: preconnect + non-blocking load -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700;800&family=Cormorant+Garamond:ital,wght@1,400&family=DM+Mono:wght@400&display=swap" onload="this.onload=null;this.rel='stylesheet'">
  <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700;800&family=Cormorant+Garamond:ital,wght@1,400&family=DM+Mono:wght@400&display=swap"></noscript>

  <link rel="stylesheet" href="funnel.css">
  <style>
    body { min-height: 100vh; background: var(--ki-bg); }

    /* ── Layout ── */
    .quiz-page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .quiz-main {
      flex: 1;
      display: flex;
      align-items: flex-start;
      padding: 60px 0 80px;
    }

    /* ── Question Counter ── */
    .quiz-counter {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      letter-spacing: .18em;
      color: var(--ki-text);
      margin-bottom: 6px;
    }

    /* ── Question Text ── */
    .question-text {
      font-size: clamp(20px, 2.5vw, 28px);
      font-weight: 700;
      color: var(--white);
      line-height: 1.25;
      margin-bottom: 32px;
    }

    /* ── Navigation ── */
    .quiz-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 32px;
      padding-top: 24px;
      border-top: 1px solid var(--ki-line);
    }

    .quiz-back-btn {
      background: none;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      font-family: 'Montserrat', sans-serif;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: .14em;
      text-transform: uppercase;
      color: var(--ki-text);
      transition: color .25s;
      padding: 0;
    }
    .quiz-back-btn:hover { color: var(--white); }
    .quiz-back-btn.hidden { visibility: hidden; pointer-events: none; }

    /* ── Lead Form ── */
    .lead-form-section {
      display: none;
    }
    .lead-form-section.active {
      display: block;
    }

    .lead-headline {
      font-size: clamp(22px, 2.5vw, 30px);
      font-weight: 700;
      color: var(--white);
      margin-bottom: 12px;
    }

    .lead-subline {
      font-size: 14px;
      font-weight: 300;
      color: var(--ki-text);
      margin-bottom: 36px;
      line-height: 1.65;
    }

    /* ── Slide animation ── */
    .question-step {
      display: none;
      animation: fadeUp .35s ease forwards;
    }
    .question-step.active { display: block; }

    @media (max-width: 768px) {
      .quiz-main { padding: 40px 0 60px; }
    }
  </style>
</head>
<body>

  <div class="quiz-page">

    <!-- Logo Bar -->
    <header class="logo-bar">
      <a href="https://www.startyourflame.de/ki" target="_blank" rel="noopener">
        <img src="media/flame_logo_main_white.png" alt="Flame KI" class="logo-img">
      </a>
    </header>

    <div class="quiz-main">
      <div class="container-narrow" style="width:100%;">

        <!-- Progress Bar -->
        <div class="progress-bar" id="progressBar"></div>

        <!-- Questions (1–11) -->
        <div id="questionsWrap"></div>

        <!-- Lead Capture (Step 12) -->
        <div class="lead-form-section" id="leadSection">
          <div class="funnel-card">
            <span class="eyebrow">Fast geschafft</span>
            <div class="lead-headline">Dein Ergebnis wird vorbereitet.</div>
            <p class="lead-subline">
              Trage kurz deine Kontaktdaten ein, damit wir dein individuelles Effizienzprofil berechnen können.
            </p>

            <form id="leadForm" novalidate>
              <div class="form-grid-2">
                <div class="form-group">
                  <label class="form-label" for="vorname">Vorname <span style="color:var(--gold)">*</span></label>
                  <input class="form-input" type="text" id="vorname" name="vorname" placeholder="Max" required>
                </div>
                <div class="form-group">
                  <label class="form-label" for="nachname">Nachname <span style="color:var(--gold)">*</span></label>
                  <input class="form-input" type="text" id="nachname" name="nachname" placeholder="Mustermann" required>
                </div>
              </div>
              <div class="form-group">
                <label class="form-label" for="email">E-Mail-Adresse <span style="color:var(--gold)">*</span></label>
                <input class="form-input" type="email" id="email" name="email" placeholder="max@beispiel.de" required>
              </div>
              <div class="form-grid-2">
                <div class="form-group">
                  <label class="form-label" for="unternehmen">Unternehmen <span style="color:var(--ki-text);font-size:9px;">(optional)</span></label>
                  <input class="form-input" type="text" id="unternehmen" name="unternehmen" placeholder="Muster GmbH">
                </div>
                <div class="form-group">
                  <label class="form-label" for="website">Website <span style="color:var(--ki-text);font-size:9px;">(optional)</span></label>
                  <input class="form-input" type="url" id="website" name="website" placeholder="www.beispiel.de">
                </div>
              </div>

              <div class="checkbox-row">
                <input type="checkbox" id="consent" name="consent" required>
                <label class="checkbox-label" for="consent">
                  Ich stimme zu, dass meine Daten zur Auswertung meines Automatisierungs-Checks und zur Kontaktaufnahme gespeichert werden. Eine Abmeldung ist jederzeit möglich.
                </label>
              </div>

              <div id="formError" style="color:#E87070;font-size:12px;margin-bottom:16px;display:none;"></div>

              <button type="submit" class="btn-gold" style="width:100%;padding:18px;">
                Analyse starten →
              </button>
            </form>
          </div>

          <!-- Back button for lead form -->
          <div style="margin-top:20px;text-align:left;">
            <button class="quiz-back-btn" id="leadBackBtn">
              ← Zurück
            </button>
          </div>
        </div>

        <!-- Quiz Navigation (for questions) -->
        <div class="quiz-nav" id="quizNav" style="display:none;">
          <button class="quiz-back-btn" id="backBtn">
            ← Zurück
          </button>
          <button class="btn-gold" id="nextBtn" disabled>
            Weiter →
          </button>
        </div>

      </div>
    </div>
  </div>

  <script src="funnel.js"></script>
  <script src="quiz.js"></script>

</body>
</html>
